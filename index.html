<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lernkarten</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <main class="page-shell">
      <p class="version-badge">v7</p>

      <section class="hero-panel">
        <h1>Lernkarten</h1>

        <div class="settings-panel">
          <label class="settings-label" for="list-select">Welche Liste möchtest du üben?</label>
          <select id="list-select" class="settings-input"></select>

          <label class="settings-label" for="repeat-count">Wie oft soll jedes Wort drankommen?</label>
          <input id="repeat-count" class="settings-input" type="number" min="1" max="25" step="1" value="5" />
        </div>
      </section>

      <section class="game-card" aria-live="polite">
        <div class="language-picker hidden" id="language-picker">
          <p class="status-label">Lernmodus</p>
          <div class="language-buttons" id="language-buttons"></div>
        </div>

        <div class="status-row">
          <div>
            <p class="status-label">Gesamtfortschritt</p>
            <p class="status-value" id="overall-progress">0 / 0</p>
          </div>
          <div>
            <p class="status-label">Fertige Wörter</p>
            <p class="status-value" id="mastered-progress">0 / 0</p>
          </div>
        </div>

        <div class="progress-bar" aria-hidden="true">
          <div class="progress-fill" id="progress-fill"></div>
        </div>

        <div id="loading-state" class="message-panel">
          <p>Deine Wörterliste wird geladen ...</p>
        </div>

        <div id="error-state" class="message-panel hidden">
          <p id="error-message"></p>
        </div>

        <div id="game-state" class="hidden">
          <p class="prompt-label" id="prompt-label">Was ist die Antwort?</p>
          <div class="flashcard-word" id="german-word">...</div>
          <p class="card-progress" id="card-progress">Schon richtig gelöst: 0 / 5</p>

          <form id="answer-form" autocomplete="off">
            <label class="input-label" for="answer-input" id="answer-label">Deine Antwort</label>
            <input
              id="answer-input"
              name="answer"
              type="text"
              spellcheck="false"
              autocapitalize="off"
              autocomplete="off"
              required
            />
            <button id="submit-button" type="submit">Prüfen</button>
          </form>

          <p class="feedback" id="feedback-text"></p>
        </div>

        <div id="complete-state" class="message-panel hidden">
          <p class="complete-title">Geschafft!</p>
          <p id="complete-message">Du hast alle Wörter richtig beantwortet.</p>
          <p id="difficult-summary"></p>
          <ul class="difficult-list hidden" id="difficult-list"></ul>
          <div class="complete-actions">
            <button id="restart-button" type="button">Alle noch einmal</button>
            <button id="difficult-button" class="secondary-button hidden" type="button">Nur schwierige Wörter üben</button>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
